name: intrst
description: the intrst app

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.0.2+1

environment:
  sdk: ^3.1.1

dependencies:
  flutter:
    sdk: flutter

  flutter_app_badger: ^1.5.0
  restart_app: ^1.8.3
  english_words: ^4.0.0
  provider: ^6.1.2
  flutter_login: ^7.0.0
  font_awesome_flutter: ^11.0.0
  firebase_auth: ^5.7.0
  firebase_core: ^3.15.2
  cloud_firestore: ^5.6.12
  google_maps_flutter: ^2.14.2
  geolocator: ^12.0.0
  label_marker: ^1.0.1
  location: ^8.0.1
  http: ^1.2.2
  uuid: ^4.5.1
  animated_toggle_switch: ^0.8.4
  google_maps_flutter_web: ^0.5.14+3
  firebase_messaging: ^15.2.10
  shared_preferences: ^2.5.3

flutter_launcher_icons:
  ios: true
  image_path_ios: "assets/favicon.png"
flutter:
  uses-material-design: true
  assets:
    - assets/